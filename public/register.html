<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Daftar akun SCPK untuk menggunakan self-screening kanker paru-paru berbasis AI.">
  <title>Daftar — SCPK Self-Screening Platform</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫁</text></svg>">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i data-lucide="heart-pulse" style="width:24px;height:24px;color:white;"></i>
        </div>
        <span class="auth-logo-text">SCPK</span>
      </div>

      <h1 class="auth-title">Buat Akun Baru</h1>
      <p class="auth-subtitle">Mulai screening kesehatan paru-paru Anda hari ini</p>

      <div class="social-login">
        <button class="social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">atau</span>
        <div class="auth-divider-line"></div>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Nama Lengkap</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="user" style="width:18px;height:18px;"></i></span>
            <input type="text" id="name" class="form-input" placeholder="Masukkan nama lengkap" required autocomplete="name">
          </div>
          <div class="form-error" id="name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="mail" style="width:18px;height:18px;"></i></span>
            <input type="email" id="email" class="form-input" placeholder="nama@email.com" required autocomplete="email">
          </div>
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px;"></i></span>
            <input type="password" id="password" class="form-input" placeholder="Minimal 8 karakter" required autocomplete="new-password">
            <button type="button" class="input-toggle" id="toggle-password" aria-label="Toggle password visibility">
              <i data-lucide="eye" style="width:18px;height:18px;"></i>
            </button>
          </div>
          <div class="password-strength" id="password-strength">
            <div class="password-strength-bar" id="str-1"></div>
            <div class="password-strength-bar" id="str-2"></div>
            <div class="password-strength-bar" id="str-3"></div>
            <div class="password-strength-bar" id="str-4"></div>
          </div>
          <div class="password-strength-text" id="password-strength-text"></div>
          <div class="form-error" id="password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Konfirmasi Password</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px;"></i></span>
            <input type="password" id="confirm-password" class="form-input" placeholder="Ulangi password" required autocomplete="new-password">
          </div>
          <div class="form-error" id="confirm-password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-submit" style="margin-top:var(--space-4);">
          <i data-lucide="user-plus" style="width:18px;height:18px;"></i>
          Daftar Sekarang
        </button>
      </form>

      <div class="auth-footer">
        Sudah punya akun? <a href="/login.html">Masuk</a>
      </div>
    </div>
  </div>

  <script src="assets/js/lib/api.js"></script>
  <script src="assets/js/lib/auth.js"></script>
  <script src="assets/js/lib/toast.js"></script>
  <script src="assets/js/lib/theme.js"></script>
  <script src="assets/js/auth/register.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
