<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LunarHealth</title>
  <meta name="description" content="Atur ulang password akun LunarHealth Anda">
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i data-lucide="heart-pulse" style="width:24px;height:24px;color:white;"></i>
        </div>
        <span class="auth-logo-text">LunarHealth</span>
      </div>

      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Masukkan password baru untuk akun Anda</p>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">Password Baru</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px;"></i></span>
            <input type="password" id="password" class="form-input" placeholder="Minimal 8 karakter" required minlength="8" autocomplete="new-password">
            <button type="button" class="input-toggle-password" id="toggle-password">
              <i data-lucide="eye" style="width:18px;height:18px;"></i>
            </button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Konfirmasi Password</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="lock" style="width:18px;height:18px;"></i></span>
            <input type="password" id="confirm-password" class="form-input" placeholder="Ulangi password baru" required minlength="8" autocomplete="new-password">
          </div>
          <div class="form-error" id="confirm-password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-submit">
          <i data-lucide="check-circle" style="width:18px;height:18px;"></i>
          Atur Ulang Password
        </button>
      </form>

      <div class="auth-footer">
        <a href="/login.html">← Kembali ke login</a>
      </div>
    </div>
  </div>

  <script src="assets/js/lib/api.js"></script>
  <script src="assets/js/lib/auth.js"></script>
  <script src="assets/js/lib/toast.js"></script>
  <script src="assets/js/lib/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const form = document.getElementById('reset-form');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirm-password');
      const toggleBtn = document.getElementById('toggle-password');

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        Toast.error('Token reset tidak valid atau sudah kadaluarsa.');
      }

      toggleBtn?.addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        toggleBtn.querySelector('i').setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        document.getElementById('password-error').textContent = '';
        document.getElementById('confirm-password-error').textContent = '';

        if (password.length < 8) {
          document.getElementById('password-error').textContent = 'Password minimal 8 karakter';
          return;
        }
        if (password !== confirm) {
          document.getElementById('confirm-password-error').textContent = 'Password tidak cocok';
          return;
        }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Mengatur ulang...';

        try {
          await API.post('/auth/reset-password', { token, password });
          Toast.success('Password berhasil direset! Silakan login.');
          setTimeout(() => { window.location.href = '/login.html'; }, 2000);
        } catch (err) {
          Toast.error(err.message || 'Gagal mereset password');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="check-circle" style="width:18px;height:18px;"></i> Atur Ulang Password';
          lucide.createIcons();
        }
      });
    });
  </script>
</body>
</html>
