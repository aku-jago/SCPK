<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — LunarHealth</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <i data-lucide="heart-pulse" style="width:24px;height:24px;color:white;"></i>
        </div>
        <span class="auth-logo-text">LunarHealth</span>
      </div>

      <h1 class="auth-title">Lupa Password?</h1>
      <p class="auth-subtitle">Masukkan email Anda dan kami akan mengirimkan instruksi reset password</p>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-group">
            <span class="input-icon"><i data-lucide="mail" style="width:18px;height:18px;"></i></span>
            <input type="email" id="email" class="form-input" placeholder="nama@email.com" required autocomplete="email">
          </div>
          <div class="form-error" id="email-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-submit">
          <i data-lucide="send" style="width:18px;height:18px;"></i>
          Kirim Instruksi Reset
        </button>
      </form>

      <div class="auth-footer">
        Ingat password? <a href="/login.html">Kembali ke login</a>
      </div>
    </div>
  </div>

  <script src="assets/js/lib/api.js"></script>
  <script src="assets/js/lib/auth.js"></script>
  <script src="assets/js/lib/toast.js"></script>
  <script src="assets/js/lib/theme.js"></script>
  <script src="assets/js/auth/forgot-password.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
