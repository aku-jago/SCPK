  <path d="M11 33 L14 33 L16 30 L18 36 L20 32 L22 34 L23 33 L29 33" stroke="url(#brand-grad-light)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
