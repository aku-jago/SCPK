<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="brand-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Rounded Square Background -->
  <rect width="48" height="48" rx="12" fill="url(#brand-grad)"/>
  <!-- Lung Left -->
  <path d="M17 16c-3.5 0-6 2.5-6 6v5c0 2.5 2 4.5 4.5 4.5S20 29.5 20 27v-7c0-2.2-1.3-4-3-4z" fill="white" opacity="0.9"/>
