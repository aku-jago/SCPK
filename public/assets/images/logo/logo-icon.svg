  <path d="M20 20c0 0 2 3 4 3s4-3 4-3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Heartbeat Line (Pulse) -->
  <path d="M14 34 L18 34 L20 30 L22 38 L24 32 L26 36 L28 34 L34 34" stroke="url(#brand-grad-light)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
