<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan — LunarHealth</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="dashboard-layout">
  <!-- Mobile Top Bar -->
  <div class="top-bar" id="top-bar">
    <button class="top-bar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
      <i data-lucide="menu" style="width:22px;height:22px;"></i>
    </button>
    <div class="navbar-brand">
      <div class="navbar-brand-icon"><i data-lucide="heart-pulse" style="width:18px;height:18px;color:white;"></i></div>
      <span style="font-size:var(--text-lg);font-weight:800;">LunarHealth</span>
    </div>
    <button class="btn btn-icon btn-ghost" id="theme-toggle-mobile" style="margin-left:auto;" aria-label="Toggle theme">
      <i data-lucide="sun" style="width:18px;height:18px;"></i>
    </button>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="navbar-brand-icon" style="background:var(--gradient-button);"><i data-lucide="heart-pulse" style="width:18px;height:18px;color:white;"></i></div>
      <span style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;color:var(--gray-900);">LunarHealth</span>
      <button class="btn btn-icon btn-ghost" id="theme-toggle" style="margin-left:auto;" aria-label="Toggle theme">
        <i data-lucide="sun" style="width:16px;height:16px;" id="theme-icon-light"></i>
        <i data-lucide="moon" style="width:16px;height:16px;display:none;" id="theme-icon-dark"></i>
      </button>
    </div>

    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-user-avatar" id="user-avatar" style="background:var(--gradient-button);color:white;cursor:pointer;" title="Klik untuk ubah profil" onclick="window.location.href='/dashboard/profile.html'">U</div>
      <div>
        <div class="sidebar-user-name" id="user-name">Loading...</div>
        <div class="sidebar-user-role" id="user-role">Pengguna</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-title">Menu Utama</div>
      <a href="/dashboard/" class="sidebar-link" id="nav-dashboard">
        <i data-lucide="layout-dashboard" style="width:20px;height:20px;"></i> Dashboard
      </a>
      <a href="/dashboard/screening.html" class="sidebar-link" id="nav-screening">
        <i data-lucide="clipboard-check" style="width:20px;height:20px;"></i> Self Screening
      </a>
      <a href="/dashboard/history.html" class="sidebar-link" id="nav-history">
        <i data-lucide="history" style="width:20px;height:20px;"></i> Riwayat
      </a>
      <a href="/dashboard/recommendation.html" class="sidebar-link" id="nav-recommendation">
        <i data-lucide="heart-handshake" style="width:20px;height:20px;"></i> Rekomendasi
      </a>

      <div class="sidebar-section-title" style="margin-top:var(--space-4);">Pengaturan Akun</div>
      <a href="/dashboard/profile.html" class="sidebar-link" id="nav-profile">
        <i data-lucide="user" style="width:20px;height:20px;"></i> Profil
      </a>
      <a href="/dashboard/settings.html" class="sidebar-link active" id="nav-settings">
        <i data-lucide="settings" style="width:20px;height:20px;"></i> Pengaturan
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-link w-full" id="btn-logout" style="color:var(--danger);">
        <i data-lucide="log-out" style="width:20px;height:20px;"></i> Keluar Akun
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content page-transition">
    <div class="page-header">
      <h1 class="page-title">Pengaturan Akun</h1>
      <p class="page-subtitle">Ubah kata sandi dan sesuaikan keamanan akun Anda.</p>
    </div>

    <div style="max-width:640px;">
      <!-- Change Password Card -->
      <div class="glass-card">
        <h2 style="font-size:var(--text-lg);font-weight:800;color:var(--gray-900);margin-bottom:var(--space-6);">Ganti Password</h2>
        <form id="settings-password-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="current-password">Password Saat Ini *</label>
            <input type="password" id="current-password" class="form-input" required minlength="8" autocomplete="current-password">
            <div class="form-error" id="current-password-error"></div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);">
            <div class="form-group">
              <label class="form-label" for="new-password">Password Baru *</label>
              <input type="password" id="new-password" class="form-input" required minlength="8" autocomplete="new-password">
              <div class="form-error" id="new-password-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-new-password">Konfirmasi Password Baru *</label>
              <input type="password" id="confirm-new-password" class="form-input" required minlength="8" autocomplete="new-password">
              <div class="form-error" id="confirm-new-password-error"></div>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:var(--space-6);">
            <button type="submit" class="btn btn-primary" id="btn-save-password">
              <i data-lucide="key" style="width:16px;height:16px;"></i> Ubah Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/assets/js/lib/api.js"></script>
  <script src="/assets/js/lib/auth.js"></script>
  <script src="/assets/js/lib/toast.js"></script>
  <script src="/assets/js/lib/theme.js"></script>
  <script src="/assets/js/dashboard/settings.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
